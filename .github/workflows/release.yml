name: Create Release and Checksum

on:
  push:
    tags:
      - 'v*' # Berjalan hanya jika Anda push tag seperti v1.0.0

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get install -y autoconf automake

    - name: Prepare Source Tarball
      run: |
        export PKG_NAME=mtd
        export PKG_VER=${{ github.ref_name }}
        # 1. Bersihkan cache autoconf agar tidak masuk ke tarball
        rm -rf autom4te.cache config.log config.status config.h Makefile
        # 2. Buat tarball di direktori satu level di atas (agar tidak berubah saat dibaca)
        # Atau gunakan flag --exclude untuk file tarball itu sendiri
        tar -cvzf ../${PKG_NAME}-${PKG_VER}.tar.gz \
            --exclude="./${PKG_NAME}-${PKG_VER}.tar.gz" \
            --exclude='./.git*' \
            --exclude='./.github' \
            .
        # 3. Pindahkan kembali ke direktori kerja untuk langkah selanjutnya
        mv ../${PKG_NAME}-${PKG_VER}.tar.gz .

    - name: Generate SHA256 Checksum
      run: |
        sha256sum mtd-${{ github.ref_name }}.tar.gz > checksum.txt
        echo "SHA256 Checksum for Termux build.sh:"
        cat checksum.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          mtd-${{ github.ref_name }}.tar.gz
          checksum.txt
        body: |
          ## MTD Release ${{ github.ref_name }}
          **SHA256 Checksum for termux-packages:**
          ```
          $(cat checksum.txt)
          ```

          Gunakan checksum di atas untuk memperbarui `build.sh` di termux-packages.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
